# CI/CD — build the container and deploy to Cloud Run on every push to main.
# Driven by a Cloud Build trigger connected to the GitHub repo (see DEPLOY.md
# → "Auto-deploy on git push"). The login password comes from the trigger's
# _BASIC_AUTH_PASS substitution, so it is NEVER committed to this repo.

substitutions:
  _REGION: us-central1
  _SERVICE: motorcycle-companion
  _BUCKET: motorcyclecompanion-502718-data
  _IMAGE: us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/motorcycle-companion:${SHORT_SHA}

# NOTE: auth is deliberately NOT managed here. BASIC_AUTH_USER/PASS,
# GOOGLE_CLIENT_ID/SECRET and ALLOWED_EMAILS are set once on the Cloud Run
# service itself (gcloud run services update --update-env-vars ...). This
# pipeline only rebuilds + ships the image, so no secret ever lives in this
# repo or in a trigger, and an auto-deploy can never wipe your login.

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args: ['build', '-t', '${_IMAGE}', '.']

  - id: push
    name: gcr.io/cloud-builders/docker
    args: ['push', '${_IMAGE}']

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}
      - --region=${_REGION}
      - --port=8080
      - --max-instances=1
      - --allow-unauthenticated
      # --update-env-vars MERGES (never replaces), so the auth vars already set
      # on the service survive every deploy untouched.
      - --update-env-vars=DATA_DIR=/data
      - --add-volume=name=data,type=cloud-storage,bucket=${_BUCKET}
      - --add-volume-mount=volume=data,mount-path=/data

images: ['${_IMAGE}']
options:
  logging: CLOUD_LOGGING_ONLY
timeout: 1200s
