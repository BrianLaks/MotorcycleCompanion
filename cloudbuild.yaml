# CI/CD — build the container and deploy to Cloud Run on every push to main.
# Driven by a Cloud Build trigger connected to the GitHub repo (see DEPLOY.md
# → "Auto-deploy on git push"). The login password comes from the trigger's
# _BASIC_AUTH_PASS substitution, so it is NEVER committed to this repo.

substitutions:
  _REGION: us-central1
  _SERVICE: motorcycle-companion
  _BUCKET: motorcyclecompanion-502718-data
  _BASIC_AUTH_USER: brian
  _BASIC_AUTH_PASS: changeme        # set in the trigger's substitutions
  _GOOGLE_CLIENT_ID: ""             # set once you create the OAuth client
  _GOOGLE_CLIENT_SECRET: ""         # set in the trigger's substitutions
  _ALLOWED_EMAILS: ""               # empty = any Google account may sign in
  _IMAGE: us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/motorcycle-companion:${SHORT_SHA}

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args: ['build', '-t', '${_IMAGE}', '.']

  - id: push
    name: gcr.io/cloud-builders/docker
    args: ['push', '${_IMAGE}']

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}
      - --region=${_REGION}
      - --port=8080
      - --max-instances=1
      - --allow-unauthenticated
      - --set-env-vars=^;^DATA_DIR=/data;BASIC_AUTH_USER=${_BASIC_AUTH_USER};BASIC_AUTH_PASS=${_BASIC_AUTH_PASS};GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID};GOOGLE_CLIENT_SECRET=${_GOOGLE_CLIENT_SECRET};ALLOWED_EMAILS=${_ALLOWED_EMAILS}
      - --add-volume=name=data,type=cloud-storage,bucket=${_BUCKET}
      - --add-volume-mount=volume=data,mount-path=/data

images: ['${_IMAGE}']
options:
  logging: CLOUD_LOGGING_ONLY
timeout: 1200s
